- id: "backend:public"
  upstream:
    preserve_host: true
    url: "http://localhost:8082"
    # strip_path: "/api/auth"
  match:
    url: "http://localhost:8080/<{hooks/*,authenticate/*}>"
    methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
  authenticators:
    - handler: noop
  authorizer:
    handler: allow
  mutators:
    - handler: noop
