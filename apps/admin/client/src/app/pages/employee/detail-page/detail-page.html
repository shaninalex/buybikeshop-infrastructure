@if (employee$ | async; as employee) {
    <form (submit)="submit($event)" class="mb-4">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-outline-secondary btn-sm" [routerLink]="['/employees']">
                    ← Back
                </button>
                <h2 class="mb-0">Employee Details</h2>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" [disabled]="!employeeForm().dirty() || employeeForm().errorSummary().length > 0">
                    <i class="bi bi-pencil"></i> Save
                </button>
            </div>
        </div>

        <!-- Employee Card -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row align-items-center">
                    <!-- Avatar -->
                    <div class="col-md-2 text-center">
                        <img
                            src="images/default-avatar.png"
                            alt="Employee Avatar"
                            class="img-fluid rounded-circle"
                        />
                    </div>

                    <!-- Basic Info -->
                    <div class="col-md-10">
                        <h4 class="mb-1">{{ employee.name }}</h4>
                        <p class="text-muted mb-2">Senior Software Engineer</p>

                        @if (employee.state === "active") {
                            <span class="badge bg-success me-2">Active</span>
                        } @else if (employee.state === "inactive") {
                            <span class="badge bg-secondary me-2">Inactive</span>
                        }
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Personal Information</h5>
            </div>
            <div class="card-body">
                <table class="table table-borderless mb-0">
                    <tbody>
                    <tr>
                        <th class="text-muted w-25">Name</th>
                        <td>
                            <input
                                type="text"
                                id="name"
                                class="form-control"
                                [formField]="employeeForm.name"
                                placeholder="Enter a name"
                            />
                            <app-form-input-error [inputField]="employeeForm.name"/>
                        </td>
                    </tr>
                    <tr>
                        <th class="text-muted">Email</th>
                        <td>
                            <input
                                type="email"
                                id="email"
                                class="form-control"
                                [formField]="employeeForm.email"
                                placeholder="john.doe@company.com"
                            />
                            <app-form-input-error [inputField]="employeeForm.email"/>
                        </td>
                    </tr>
                    <tr>
                        <th class="text-muted">Phone</th>
                        <td>
                            <input
                                type="tel"
                                id="phone"
                                class="form-control"
                                [formField]="employeeForm.phone"
                            />
                            <app-form-input-error [inputField]="employeeForm.phone"/>
                        </td>
                    </tr>
                    <tr>
                        <th class="text-muted">Date of Birth</th>
                        <td>
                            <div class="d-flex align-items-center justify-content-start gap-2">
                                <button class="btn btn-outline-secondary" type="button" (click)="picker.open()">
                                    <i class="fa-regular fa-calendar-days"></i>
                                </button>
                                <input class="form-control"
                                       [formField]="employeeForm.dob"
                                       [matDatepicker]="picker"
                                       (click)="picker.open()"
                                />
                                <mat-datepicker #picker></mat-datepicker>
                            </div>
                            <app-form-input-error [inputField]="employeeForm.dob"/>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </form>

    <hr>

    <div class="alert alert-danger">
        <h4>Danger zone</h4>
        <button type="button" class="btn btn-danger">Delete employee</button>
    </div>
}
