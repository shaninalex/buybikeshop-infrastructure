<div class="d-flex justify-content-between align-items-center mb-4">
    <div class="d-flex align-items-center gap-3">
        <button class="btn btn-outline-secondary btn-sm" [routerLink]="['/employees']">
            ← Back
        </button>
    </div>
</div>

<hr class="mb-4">

<!-- Creation Method -->
<div class="mb-4">
    <div class="form-label fw-bold">Creation Method</div>

    <div class="form-check">
        <input
            class="form-check-input"
            type="radio"
            id="manual"
            value="manual"
            [(ngModel)]="creationMethod"
        />
        <label class="form-check-label" for="manual">
            Create Manually
        </label>
    </div>

    <div class="form-check">
        <input
            class="form-check-input"
            type="radio"
            id="google"
            value="google"
            [(ngModel)]="creationMethod"
        />
        <label class="form-check-label" for="google">
            Create via Google Workspace
        </label>
    </div>
</div>

@if (creationMethod === 'google') {
    <app-employee-create-google-form/>
}

@if (creationMethod === 'manual') {
    <app-employee-create-manual-form/>
}
