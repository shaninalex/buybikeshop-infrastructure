{% from "partials/navbar.html" import navbar with context %}
{% from "partials/sidebar.html" import sidebar with context %}

<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BuyBikeShop</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/app.css" rel="stylesheet">

    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
    <link rel="manifest" href="/static/site.webmanifest">
</head>
<body class="vh-100">

{{ navbar() }}

<div class="dashboard-content">
    <div class="dashboard-sidebar border-end">
        {{ sidebar() }}
    </div>
    <div class="container-fluid flex-grow-1 overflow-auto">
        {% block content %}{% endblock %}
    </div>
</div>


<script src="/static/js/bootstrap.bundle.min.js"></script>
</body>
</html>
