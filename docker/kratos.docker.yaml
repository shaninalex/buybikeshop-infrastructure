services:
  kratos-migrate:
    image: oryd/kratos:v25.4.0
    environment:
      - DSN=postgres://postgres:postgres@postgres:5432/postgres?sslmode=disable&search_path=employees
    volumes:
      - type: bind
        source: ../resources/kratos/
        target: /etc/config/kratos/
    command: -c /etc/config/kratos/kratos.yml migrate sql -e --yes
    restart: on-failure
    networks:
      - intranet

  kratos-selfservice-ui-node:
    image: oryd/kratos-selfservice-ui-node:v25.4.0
    ports:
      - "4455:4455"
    environment:
      - KRATOS_PUBLIC_URL=http://kratos:4433/
      - KRATOS_BROWSER_URL=http://127.0.0.1:4433/
      - HYDRA_ADMIN_URL=http://hydra:4445
      - PORT=4455
      - COOKIE_SECRET=SuperSecretCookie
      - CSRF_COOKIE_NAME=__OryKratosApp
      - CSRF_COOKIE_SECRET=SuperSecretCookieCsrf
    networks:
      - intranet
    restart: on-failure

  kratos:
    depends_on:
      - kratos-migrate
    image: oryd/kratos:v25.4.0
    ports:
      - "4433:4433" # public
      - "4434:4434" # admin
    restart: unless-stopped
    environment:
      - DSN=postgres://postgres:postgres@postgres:5432/postgres?sslmode=disable&search_path=employees
    command: serve -c /etc/config/kratos/kratos.yml --dev --watch-courier
    volumes:
      - type: bind
        source: ../resources/kratos/
        target: /etc/config/kratos/
    networks:
      - intranet
