[project]
name = "grpc_buybikeshop_python"
version = "0.0.0"
description = "Generated gRPC Python stubs for buybikeshop"
dependencies = [
    "grpcio>=1.78.0",
    "protobuf>=6.33.6",
]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["catalog*"]

[tool.setuptools]
py-modules = ["catalog_pb2", "catalog_pb2_grpc"]
