syntax = "proto3";

package partners;

option go_package = "grpc-buybikeshop-go/partners";

import "partners/partners_types.proto";

service Partners {
  rpc PartnersList(PartnersListRequest) returns (PartnersListReply) {}
  rpc PartnersSave(PartnersSaveRequest) returns (PartnersSaveReply) {} // create/update
  rpc PartnersDelete(PartnersDeleteRequest) returns (PartnersDeleteReply) {}

  rpc PartnerRoleList(PartnerRoleListRequest) returns (PartnerRoleListReply) {}
  rpc PartnerRoleSave(PartnerRoleSaveRequest) returns (PartnerRoleSaveReply) {} // create/update
  rpc PartnerRoleDelete(PartnerRoleDeleteRequest) returns (PartnerRoleDeleteReply) {}
}
